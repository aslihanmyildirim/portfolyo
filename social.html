<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sosyal Medya — Aslıhan Yıldırım</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ink: #262626;
      --accent: #ffffe9;
      --bg: #f3f3f3;
      --font: "Figtree", sans-serif;
    }

    body {
      font-family: var(--font);
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    .nav {
      margin: 12px auto 4px;
      height: 56px;
      width: max-content;
      background: #f7f7f7;
      border-radius: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 8px;
      z-index: 1000;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      font-size: 15px;
      font-weight: 500;
      color: #262626;
      text-decoration: none;
      border-radius: 100px;
      transition: background 0.2s ease;
    }
    .nav-item:hover { background: rgba(255,255,255,0.6); }
    .nav-item.active { background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .nav-item.active:hover { background: #ffffff; }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 40px 80px;
    }

    .page-head {
      margin-bottom: 32px;
    }
    .page-title {
      font-size: 44px;
      font-weight: 800;
      letter-spacing: -1.4px;
      line-height: 1.1;
      margin-bottom: 12px;
    }
    .page-sub {
      font-size: 17px;
      font-weight: 500;
      color: rgba(38,38,38,0.55);
    }
    .section-title {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1px;
      margin: 56px 0 20px;
      color: var(--ink);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-auto-flow: dense;
      gap: 16px;
    }
    .tile {
      width: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: #f4f4f2;
    }
    .tile.span-2 { grid-column: span 2; }
    .tile.span-3 { grid-column: span 3; }
    .tile img {
      width: 100%;
      height: auto;
      display: block;
    }

    @media (max-width: 768px) {
      .page { padding: 16px 16px 60px; }
      .page-title { font-size: 32px; letter-spacing: -1px; }
      .page-sub { font-size: 15px; }
      .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .tile { border-radius: 14px; }
      .tile.span-2, .tile.span-3 { grid-column: span 2; }
      .tile-l1 { order: 1; }
      .tile-l2 { order: 2; }
      .tile-l3 { order: 3; }
      .tile-l4 { order: 4; }
      .tile-l5 { order: 5; }
      .tile-l6 { order: 6; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="index.html" class="nav-item active">Home</a>
    <a href="about.html" class="nav-item">About</a>
    <a href="contact.html" class="nav-item">Contact</a>
  </nav>

  <main class="page">
    <div class="page-head">
      <h1 class="page-title">Sosyal Medya Tasarımları</h1>
    </div>

    <div class="grid">
      <div class="tile"><img src="assets/p16.png" alt="Post 16" loading="lazy" /></div>
      <div class="tile"><img src="assets/p17.png" alt="Post 17" loading="lazy" /></div>
      <div class="tile"><img src="assets/p18.png" alt="Post 18" loading="lazy" /></div>
      <div class="tile"><img src="assets/p19.png" alt="Post 19" loading="lazy" /></div>
      <div class="tile"><img src="assets/p1.png" alt="Post 1" loading="lazy" /></div>
      <div class="tile"><img src="assets/p2.png" alt="Post 2" loading="lazy" /></div>
      <div class="tile"><img src="assets/p3.png" alt="Post 3" loading="lazy" /></div>
      <div class="tile"><img src="assets/p4.png" alt="Post 4" loading="lazy" /></div>
      <div class="tile"><img src="assets/p 5.png" alt="Post 5" loading="lazy" /></div>
      <div class="tile"><img src="assets/p6.png" alt="Post 6" loading="lazy" /></div>
      <div class="tile"><img src="assets/p10.png" alt="Post 10" loading="lazy" /></div>
      <div class="tile"><img src="assets/p11.png" alt="Post 11" loading="lazy" /></div>
      <div class="tile"><img src="assets/p12.png" alt="Post 12" loading="lazy" /></div>
      <div class="tile"><img src="assets/p13.png" alt="Post 13" loading="lazy" /></div>
      <div class="tile"><img src="assets/p14.png" alt="Post 14" loading="lazy" /></div>
      <div class="tile"><img src="assets/p15.png" alt="Post 15" loading="lazy" /></div>
      <div class="tile"><img src="assets/p20.png" alt="Post 20" loading="lazy" /></div>
      <div class="tile"><img src="assets/p21.png" alt="Post 21" loading="lazy" /></div>
      <div class="tile"><img src="assets/p22.png" alt="Post 22" loading="lazy" /></div>
      <div class="tile"><img src="assets/p23.png" alt="Post 23" loading="lazy" /></div>
      <div class="tile"><img src="assets/p24.png" alt="Post 24" loading="lazy" /></div>
      <div class="tile"><img src="assets/p29.png" alt="Post 29" loading="lazy" /></div>
      <div class="tile"><img src="assets/p26.png" alt="Post 26" loading="lazy" /></div>
      <div class="tile"><img src="assets/p27.png" alt="Post 27" loading="lazy" /></div>
      <div class="tile"><img src="assets/p28.png" alt="Post 28" loading="lazy" /></div>
      <div class="tile"><img src="assets/p7.png" alt="Post 7" loading="lazy" /></div>
      <div class="tile"><img src="assets/p8.png" alt="Post 8" loading="lazy" /></div>
      <div class="tile"><img src="assets/p9.png" alt="Post 9" loading="lazy" /></div>
    </div>

    <h2 class="section-title">App Icon</h2>
    <div class="grid">
      <div class="tile tile-l1"><img src="assets/l1.png" alt="App Icon 1" loading="lazy" /></div>
      <div class="tile tile-l2"><img src="assets/l2.png" alt="App Icon 2" loading="lazy" /></div>
      <div class="tile tile-l5"><img src="assets/l5.png" alt="App Icon 5" loading="lazy" /></div>
      <div class="tile tile-l4"><img src="assets/l4.png" alt="App Icon 4" loading="lazy" /></div>
      <div class="tile tile-l3"><img src="assets/l3.png" alt="App Icon 3" loading="lazy" /></div>
      <div class="tile tile-l6"><img src="assets/l6.png" alt="App Icon 6" loading="lazy" /></div>
    </div>
  </main>

  <script>
    document.querySelectorAll('.tile img').forEach(img => {
      const apply = () => {
        const r = img.naturalWidth / img.naturalHeight;
        const tile = img.parentElement;
        if (r >= 2.4) tile.classList.add('span-3');
        else if (r >= 1.4) tile.classList.add('span-2');
      };
      if (img.complete && img.naturalWidth) apply();
      else img.addEventListener('load', apply);
    });
  </script>

</body>
</html>
